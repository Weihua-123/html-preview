<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博木鱼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212;
            color: #FFFFFF;
            font-family: 'Kaiti SC', 'PingFang SC', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 0;
            overflow-x: hidden;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            width: 100%;
        }

        .title {
            font-size: 25vw;
            font-family: 'Kaiti SC', serif;
            background: linear-gradient(180deg, rgba(255, 176, 103, 0.05), rgba(115, 55, 0, 0.02));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            user-select: none;
        }

        .score {
            font-size: 10vh;
            font-family: 'PingFang SC', sans-serif;
            font-weight: 900;
            margin: 1rem 0 0.5rem;
            user-select: none;
        }

        .deed {
            font-size: 5vh;
            font-family: 'PingFang SC', sans-serif;
            user-select: none;
        }

        /* 木鱼点击区域 */
        .wooden-fish-area {
            position: relative;
            margin: 3rem 0;
            cursor: pointer;
            user-select: none;
        }

        .wooden-fish {
            width: 284px;
            max-width: 70vw;
            transition: transform 0.1s ease;
        }

        .hammer {
            position: absolute;
            top: -20px;
            right: -30px;
            width: 119px;
            max-width: 25vw;
            transform-origin: bottom left;
            transition: transform 0.1s ease;
            pointer-events: none;
        }

        /* 漂浮字幕动画 */
        .floating-text {
            position: absolute;
            left: 50%;
            top: -20px;
            transform: translateX(-50%);
            font-family: 'PingFang SC', sans-serif;
            font-size: 1.5em;
            color: #FFB067;
            animation: floatUp 0.4s ease forwards;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) translateY(-50px);
            }
        }

        /* 底部提示 */
        .footer {
            text-align: center;
            font-family: 'Kaiti SC', serif;
            font-size: 1.2em;
            opacity: 0.8;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">赛博木鱼</h1>
        <div class="score" id="score">0</div>
        <div class="deed">功德</div>
    </div>

    <div class="wooden-fish-area" id="woodenFishArea">
        <img src="https://img.alicdn.com/imgextra/i3/O1CN012CO0YU1VSfNs506ZS_!!6000000002652-2-tps-284-236.png" alt="木鱼" class="wooden-fish" id="woodenFish">
        <img src="https://img.alicdn.com/imgextra/i1/O1CN01tKb5Et1aSjWRjCHK3_!!6000000003329-2-tps-119-69.png" alt="木鱼锤" class="hammer" id="hammer">
    </div>

    <div class="footer">
        轻敲木鱼，细悟赛博真经。
    </div>

    <script>
        // 初始化元素
        const scoreEl = document.getElementById('score');
        const woodenFish = document.getElementById('woodenFish');
        const hammer = document.getElementById('hammer');
        const woodenFishArea = document.getElementById('woodenFishArea');
        const knockAudio = new Audio('https://qianwen.alicdn.com/resource/qiaomuyu.mp3');
        knockAudio.preload = 'auto';
        
        let score = 0;

        // 点击事件处理
        woodenFishArea.addEventListener('click', () => {
            // 增加功德
            score++;
            scoreEl.textContent = score;

            // 播放音效，重置播放进度实现连续点击音效
            knockAudio.currentTime = 0;
            knockAudio.play().catch(err => console.log('音频播放失败:', err));

            // 木鱼放大动画
            woodenFish.style.transform = 'scale(1.1)';
            setTimeout(() => {
                woodenFish.style.transform = 'scale(1)';
            }, 100);

            // 锤子敲击动画
            hammer.style.transform = 'rotate(-25deg)';
            setTimeout(() => {
                hammer.style.transform = 'rotate(0deg)';
            }, 100);

            // 创建漂浮功德+1文字
            const floatingText = document.createElement('div');
            floatingText.className = 'floating-text';
            floatingText.textContent = '功德+1';
            woodenFishArea.appendChild(floatingText);
            
            // 动画结束后移除元素
            setTimeout(() => {
                floatingText.remove();
            }, 400);
        });

        // 支持移动端触摸点击
        woodenFishArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            woodenFishArea.click();
        });
    </script>
</body>
</html>
